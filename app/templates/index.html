<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Todo App</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; background: #f5f5f5; }
        h1 { font-size: 1.5rem; margin-bottom: 20px; }
        .input-row { display: flex; gap: 8px; margin-bottom: 24px; }
        input[type="text"] { flex: 1; padding: 10px; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 16px; cursor: pointer; border: none; border-radius: 4px; font-size: 0.9rem; }
        .btn-add { background: #333; color: white; }
        .todo-item { display: flex; align-items: center; gap: 10px; background: white; padding: 12px; border-radius: 4px; margin-bottom: 8px; }
        .todo-text { flex: 1; }
        .todo-text.done { text-decoration: line-through; color: #aaa; }
        .btn-toggle { background: #e8f5e9; color: #2e7d32; }
        .btn-delete { background: #fdecea; color: #c62828; }
        .time { font-size: 0.75rem; color: #999; }
        .empty { color: #999; text-align: center; margin-top: 40px; }
    </style>
</head>
<body>
    <h1>Yapılacaklar</h1>

    <div class="input-row">
        <input type="text" id="todoInput" placeholder="Yeni görev..." />
        <button class="btn-add" onclick="addTodo()">Ekle</button>
    </div>

    <div id="todoList"></div>

    <script>
        async function load() {
            const res = await fetch("/todos");
            const todos = await res.json();
            const list = document.getElementById("todoList");
            if (todos.length === 0) {
                list.innerHTML = '<p class="empty">Henüz görev yok.</p>';
                return;
            }
            list.innerHTML = todos.map(t => `
                <div class="todo-item">
                    <span class="todo-text ${t.done ? 'done' : ''}">${t.text}</span>
                    <span class="time">${t.created_at}</span>
                    <button class="btn-toggle" onclick="toggle(${t.id})">${t.done ? 'Geri al' : 'Tamamla'}</button>
                    <button class="btn-delete" onclick="remove(${t.id})">Sil</button>
                </div>
            `).join("");
        }

        async function addTodo() {
            const input = document.getElementById("todoInput");
            const text = input.value.trim();
            if (!text) return;
            await fetch("/todos", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text })
            });
            input.value = "";
            load();
        }

        async function toggle(id) {
            await fetch(`/todos/${id}/toggle`, { method: "PATCH" });
            load();
        }

        async function remove(id) {
            await fetch(`/todos/${id}`, { method: "DELETE" });
            load();
        }

        document.getElementById("todoInput").addEventListener("keydown", e => {
            if (e.key === "Enter") addTodo();
        });

        load();
    </script>
</body>
</html>
